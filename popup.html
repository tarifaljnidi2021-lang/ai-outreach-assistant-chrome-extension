<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="panel">
      <div class="header-row">
        <div class="brand">
          <div>
            <div class="brand-title">TALINEM</div>
          </div>
        </div>
        <button id="open-talinem">Open TALINEM</button>
      </div>
    </div>

    <div class="panel">
      <label for="list-select">Select or create a list</label>
      <div class="list-row">
        <select id="list-select">
          <option value="" selected>Select a list</option>
        </select>
        <button id="create-list" type="button">Create</button>
      </div>

      <label for="count">Number to import</label>
      <input id="count" type="number" min="1" value="100" />
      <button id="extract">Extract & Send to API</button>
      <div id="status"></div>
    </div>

    <div id="create-list-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="create-list-title">
      <div class="modal">
        <h2 id="create-list-title" class="modal-title">Create a list</h2>
        <input id="list-name-input" type="text" placeholder="My list" autocomplete="off" />
        <div class="modal-actions">
          <button id="modal-cancel" type="button" class="btn-secondary">Cancel</button>
          <button id="modal-create" type="button" class="btn-primary" disabled>Create</button>
        </div>
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
