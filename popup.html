<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 14px;
        width: 320px;
        background: #f4f6fb;
        color: #111;
        
      }
      .panel {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        padding: 16px;
        margin-bottom: 12px;
      }
      .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .brand-icon {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        background: #0a66c2;
        color: #fff;
        font-weight: 700;
        font-size: 16px;
      }
      .brand-title {
        font-size: 14px;
        font-weight: 700;
      }
      .brand-subtitle {
        font-size: 12px;
        color: #5f6c80;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: #5f6c80;
        font-size: 12px;
        font-weight: 600;
      }
      input,
      button {
        width: 100%;
        padding: 12px 12px;
        margin: 6px 0;
        box-sizing: border-box;
        font-size: 14px;
        border-radius: 10px;
      }
      input {
        border: 1px solid #dde3ef;
        background: #f9fbff;
      }
      button {
        cursor: pointer;
        background-color: #0a66c2;
        color: white;
        border: none;
        font-weight: 700;
      }
      button:hover {
        background-color: #004182;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      #open-talinem {
        padding: 11px 16px;
      }
      #status {
        margin-top: 12px;
        padding: 10px;
        border-radius: 10px;
        font-size: 13px;
        text-align: center;
        display: none;
      }
      #status.success {
        display: block;
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      #status.error {
        display: block;
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      #status.loading {
        display: block;
        background-color: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="header-row">
        <div class="brand">
          <div>
            <div class="brand-title">TALINEM</div>
          </div>
        </div>
        <button id="open-talinem">Open TALINEM</button>
      </div>
    </div>

    <div class="panel">
      <label for="count">Number to import</label>
      <input id="count" type="number" min="1" value="100" />
      <button id="extract">Extract & Send to API</button>
      <div id="status"></div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
